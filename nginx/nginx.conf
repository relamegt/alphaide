events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── IDE on port 80 ─────────────────────────────────────
  server {
    listen 80 default_server;
    server_name localhost;

    location ~* /api/extensionquery {
      return 403 '{"message":"Disabled"}';
      add_header Content-Type application/json always;
    }

    location / {
      proxy_pass         http://127.0.0.1:8080;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 86400s;
      proxy_buffering    on;
      sub_filter '</head>' '<style>
        [aria-label="Extensions (Ctrl+Shift+X)"],
        [title="Extensions (Ctrl+Shift+X)"],
        li[id*="workbench.view.extensions"],
        .composite-bar li[aria-label*="Extensions"] {
          display:none !important;
        }
      </style></head>';
      sub_filter_once    on;
      sub_filter_types   text/html;
    }

    location /alpha-init/ {
      proxy_pass http://127.0.0.1:8081/;
    }
  }

  # ── App Preview on port 3001 ────────────────────────────
  # Proxies Vite at ROOT — no subpath, no base, no 404s
  server {
    listen 3001 default_server;
    server_name localhost;

    location / {
      proxy_pass         http://127.0.0.1:5173;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       localhost;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 86400s;
      proxy_buffering    off;
      proxy_intercept_errors on;
      error_page 502 503 504 = @not_running;
    }

    # HTML live-server on 8181
    location /html/ {
      proxy_pass         http://127.0.0.1:8181/;
      proxy_http_version 1.1;
      proxy_set_header   Host localhost;
      proxy_buffering    off;
    }

    location @not_running {
      default_type text/html;
      return 200 '<!DOCTYPE html>
<html><head><title>AlphaLearn — Start App</title>
<meta http-equiv="refresh" content="3">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d1a;color:#fff;font-family:monospace;
       display:flex;align-items:center;justify-content:center;
       min-height:100vh;flex-direction:column;text-align:center;padding:24px}
  .logo{font-size:26px;font-weight:700;color:#e94560;margin-bottom:6px}
  .sub{color:#555;font-size:12px;margin-bottom:28px}
  h3{color:#e94560;margin-bottom:16px;font-size:16px}
  .cmd{background:#0f0f1a;border:1px solid #2a2a3a;padding:13px 28px;
       border-radius:8px;color:#e94560;font-size:14px;margin:8px 0;
       display:inline-block;min-width:280px}
  .tip{color:#444;font-size:11px;margin-top:20px;line-height:2.2}
  .btn{margin-top:18px;background:#e94560;border:none;color:#fff;
       padding:10px 28px;border-radius:7px;cursor:pointer;
       font-size:13px;font-weight:600}
  hr{border:none;border-top:1px solid #1a1a2a;margin:16px auto;width:300px}
</style>
</head>
<body>
  <div class="logo">🅐 AlphaLearn IDE</div>
  <div class="sub">App Preview</div>
  <h3>⚠️ App not running yet</h3>
  <p style="color:#aaa;font-size:13px;margin-bottom:14px">
    In the IDE terminal run:
  </p>
  <div class="cmd">npm install</div>
  <div class="cmd">npm run dev</div>
  <hr>
  <p style="color:#666;font-size:12px;margin-bottom:10px">For HTML/CSS/JS:</p>
  <div class="cmd">alpha preview</div>
  <div class="tip">
    Page auto-refreshes every 3 seconds.<br>
    Preview always at → <span style="color:#e94560">http://localhost:3001</span>
  </div>
  <button class="btn" onclick="location.reload()">🔄 Retry</button>
</body></html>';
    }
  }
}