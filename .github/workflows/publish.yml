name: Build & Publish AlphaLearn IDE

on:
  push:
    branches: [main]
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/alphalearnide:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/alphalearnide:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "✅ Image pushed:"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/alphalearnide:latest"
          echo "   ${{ secrets.DOCKERHUB_USERNAME }}/alphalearnide:${{ github.sha }}"